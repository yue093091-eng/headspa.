<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editing and Printing</title>
    <style>
        /* 消除页面边距，让 PDF 铺满 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #525659; /* 模拟 PDF 阅读器的背景色 */
        }

        /* 让 PDF 容器占据整个屏幕 */
        .pdf-viewer {
            width: 100%;
            height: 100vh;
            border: none;
        }

        /* 打印时只打印 PDF 内容 */
        @media print {
            .pdf-viewer {
                height: 100%;
            }
        }
    </style>
</head>
<body>

    <iframe src="headspa.pdf" class="pdf-viewer"></iframe>

</body>
</html>
