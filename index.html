<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editing and Printing</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #525659;
        }
        /* 针对手机端优化的容器 */
        .pdf-viewer {
            width: 100%;
            height: 100vh;
            border: none;
            display: block;
        }
        /* 提示层：如果手机还是打不开，显示一个下载按钮 */
        .fallback {
            display: none;
            text-align: center;
            color: white;
            padding-top: 50px;
        }
    </style>
</head>
<body>

    <embed src="headspa.pdf#toolbar=0&view=FitH" type="application/pdf" class="pdf-viewer" />

    <div class="fallback" id="fallbackText">
        <p>This browser doesn't support online filling.</p>
        <a href="headspa.pdf" style="color: #ffdbac;">Click here to download and fill</a>
    </div>

</body>
</html>
